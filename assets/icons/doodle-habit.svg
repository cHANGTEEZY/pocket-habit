<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Doodle daily routine person icon</title>
  <desc id="desc">
    A doodle-style illustration of a person surrounded by routine icons:
    dumbbell, clock, sun, book, circular arrow, and gear.
  </desc>

  <style>
    .outline {
      stroke: #2464e8;
      stroke-width: 11;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .thin {
      stroke: #2464e8;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .face-line {
      stroke: #2464e8;
      stroke-width: 7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .blue-fill {
      fill: #b9d9ff;
    }

    .light-blue-fill {
      fill: #dceeff;
    }

    .pink-fill {
      fill: #ffd0df;
    }

    .yellow-fill {
      fill: #ffe27a;
    }

    .white-fill {
      fill: #ffffff;
    }

    .skin-fill {
      fill: #ffd3bd;
    }

    .no-fill {
      fill: none;
    }
  </style>

