      stroke: #000000;
      stroke-width: 11;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .thin {
      stroke: #000000;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .dot {
      fill: #000000;
    }
  </style>

